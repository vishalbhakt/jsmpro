{% extends "dashboard_base.html" %}
{% load static %}

{% block title %}Edit Subject - JSM Shiksha Academy{% endblock %}

{% block dashboard_content %}
<div class="premium-card p-4 p-md-5 mb-4 text-white" style="background: linear-gradient(135deg, #0c2b4d 0%, #0d3b66 100%);">
    <h1 class="display-6 fw-bold text-white mb-2" style="font-family:'Outfit',sans-serif;">✏️ Edit Subject</h1>
    <p class="text-white-50 mb-0">Modify details for subject "{{ subject.name }}".</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="premium-card p-4 p-md-5 bg-white">
            <h4 class="fw-bold mb-4 text-primary" style="font-family:'Outfit',sans-serif;">
                <i class="fa-solid fa-book-open me-2 text-accent"></i> Subject Details
            </h4>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold text-sm text-primary">Subject Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" value="{{ subject.name }}" class="form-control rounded-3" placeholder="e.g. Mathematics" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-sm text-primary">Subject Code <span class="text-danger">*</span></label>
                    <input type="text" name="code" value="{{ subject.code }}" class="form-control rounded-3" placeholder="e.g. MATH10" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-sm text-primary">Classroom / Grade <span class="text-danger">*</span></label>
                    <select name="classroom" class="form-select rounded-3" required>
                        <option value="">-- Select Class --</option>
                        {% for cls in classrooms %}
                        <option value="{{ cls.id }}" {% if subject.classroom.id == cls.id %}selected{% endif %}>{{ cls.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-sm text-primary">Assign Teacher</label>
                    <select name="teacher" class="form-select rounded-3">
                        <option value="">-- Select Teacher --</option>
                        {% for t in teachers %}
                        <option value="{{ t.id }}" {% if subject.teacher.id == t.id %}selected{% endif %}>{{ t.user.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_active" id="flexSwitchCheckChecked" {% if subject.is_active %}checked{% endif %}>
                        <label class="form-check-label fw-bold text-sm text-primary" for="flexSwitchCheckChecked">Subject Active</label>
                    </div>
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-premium-primary rounded-pill px-5 py-3 fw-bold flex-grow-1">
                        <i class="fa-solid fa-save me-2"></i> Save Changes
                    </button>
                    <a href="{% url 'admin_subjects' %}" class="btn btn-premium-outline rounded-pill px-4 py-3 fw-bold">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
